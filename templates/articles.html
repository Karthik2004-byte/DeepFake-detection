{% extends "base.html" %}

{% block title %}Deepfake News | TruthNet{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Latest Deepfake & AI Detection News</h2>
    <div class="row">
        {% for article in articles %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                {% if article.image_url %}
                <img src="{{ article.image_url }}" class="card-img-top" alt="Article Image">
                {% endif %}
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ article.title }}</h5>
                    <p class="card-text">{{ article.summary }}</p>
                    <a href="{{ article.link }}" target="_blank" class="btn btn-primary mt-auto">Read More</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
